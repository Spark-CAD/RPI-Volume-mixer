<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1.0">
<title>Audio Console</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oxanium:wght@300;400;600;700;800&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080a0d;
  --panel:     #0d1017;
  --surface:   #131820;
  --raised:    #1a2030;
  --border:    #1e2838;
  --border-hi: #2e3d52;
  --amber:     #ffb340;
  --amber-glow:rgba(255,179,64,0.2);
  --cyan:      #00e5ff;
  --cyan-glow: rgba(0,229,255,0.18);
  --green:     #00e676;
  --red:       #ff1744;
  --text:      #b8c8dc;
  --text-dim:  #4a6080;
  --text-faint:#1e2d3d;
  --mono:      'Share Tech Mono', monospace;
  --display:   'Oxanium', sans-serif;
  --body:      'Rajdhani', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  width: 800px; height: 480px;
  overflow: hidden;
  font-family: var(--body);
  user-select: none;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg,
    transparent, transparent 2px,
    rgba(0,0,0,0.022) 2px, rgba(0,0,0,0.022) 4px);
  pointer-events: none; z-index: 999;
}

/* ═══ LAYOUT: media | launch | pots ═══════════════════════════════════════ */
.console {
  display: grid;
  grid-template-rows: 256px 104px 120px;
  height: 480px;
}

/* ═══ TOP — MEDIA BAR ══════════════════════════════════════════════════════ */
.media-bar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: 220px 1fr 220px;
  position: relative;
  overflow: hidden;
}
.media-bar::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg,
    transparent, var(--cyan) 20%, var(--amber) 55%, var(--cyan) 80%, transparent);
  opacity: 0.4;
}

/* ═══ LEFT WIDGET (mirrors right widget system) ═══════════════════════════ */
.art-col {
  border-right: 1px solid var(--border);
  position: relative; overflow: hidden;
  cursor: grab;
}
.art-col:active { cursor: grabbing; }
#leftWidgetCol { width: 100%; height: 100%; }

/* ── Swipe dots (hidden by default, appear on swipe, fade after 2s) ── */
.lw-dots {
  position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 5px; z-index: 20; pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
}
.lw-dots.visible { opacity: 1; }
.lw-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--text-faint); transition: all 0.3s;
}
.lw-dot.active { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }

/* ── Status dot (over left widget) ── */
.art-status {
  position: absolute; bottom: 8px; right: 8px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-faint); transition: all 0.4s; z-index: 5;
}
.art-status.playing {
  background: var(--green); box-shadow: 0 0 8px var(--green);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ─────────────────────────────────────────
   Widget 1: Disc (spinning vinyl record)
───────────────────────────────────────── */
.lw-disc {
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at 40% 35%, #16203a, #050810);
  display: flex; align-items: center; justify-content: center;
}
.art-disc {
  width: 148px; height: 148px; border-radius: 50%;
  background: conic-gradient(from 0deg,
    #0d1a30 0%, #1a3050 22%, #0a1020 44%, #122840 66%, #0a1525 88%, #0d1a30 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 30px rgba(0,229,255,0.1), 0 6px 28px rgba(0,0,0,0.7);
  animation: discSpin 12s linear infinite;
  animation-play-state: paused;
  position: relative;
}
.art-disc::before {
  content: ''; position: absolute; inset: 14px;
  border-radius: 50%; border: 1px solid rgba(0,229,255,0.07);
}
.art-disc.spinning { animation-play-state: running; }
.disc-hub {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--border-hi); z-index: 1;
}
@keyframes discSpin { to { transform: rotate(360deg); } }

/* ─────────────────────────────────────────
   Widget 2: Circular VU (radial bars on disc)
───────────────────────────────────────── */
.lw-circular-vu {
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at 50% 50%, #0a1828, #050810);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
#circVuCanvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}

/* ─────────────────────────────────────────
   Widget 3: Waveform oscilloscope
───────────────────────────────────────── */
.lw-waveform {
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at 50% 60%, #0a1a10, #050810);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
#waveCanvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
.lw-waveform-lbl {
  position: absolute; top: 10px; left: 10px;
  font-family: var(--mono); font-size: 7px; letter-spacing: 2px;
  color: rgba(0,230,118,0.3); text-transform: uppercase; pointer-events:none;
}

/* ─────────────────────────────────────────
   Widget 4: Spectrum analyzer bars
───────────────────────────────────────── */
.lw-spectrum {
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at 50% 100%, #120a28, #050810);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
#specCanvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
.lw-spectrum-lbl {
  position: absolute; top: 10px; left: 10px;
  font-family: var(--mono); font-size: 7px; letter-spacing: 2px;
  color: rgba(180,100,255,0.35); text-transform: uppercase; pointer-events:none;
}

/* Track info */
.track-col {
  padding: 20px 18px 16px;
  display: flex; flex-direction: column;
  justify-content: space-between; min-width: 0;
}
.src-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.src-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-faint); flex-shrink: 0; transition: all 0.4s;
}
.src-dot.live { background: var(--cyan); box-shadow: 0 0 7px var(--cyan); }
.src-tag {
  font-family: var(--mono); font-size: 9px; letter-spacing: 3px;
  color: var(--text-faint); text-transform: uppercase; transition: color 0.4s;
}
.src-tag.live { color: var(--cyan); opacity: 0.8; }
.track-title-wrap {
  overflow: hidden; white-space: nowrap; position: relative;
  line-height: 1; margin-bottom: 0;
}
.track-title {
  font-family: var(--display); font-size: 32px; font-weight: 700;
  color: #dce8f8; letter-spacing: -0.5px;
  white-space: nowrap; display: inline-block;
  line-height: 1; text-shadow: 0 0 40px rgba(0,229,255,0.1);
  /* scrolling managed by JS */
}
.track-title.scrolling {
  animation: titleScroll var(--scroll-dur, 8s) linear var(--scroll-delay, 2s) 1 forwards;
}
@keyframes titleScroll {
  0%   { transform: translateX(0); }
  85%  { transform: translateX(var(--scroll-dist, -200px)); }
  100% { transform: translateX(var(--scroll-dist, -200px)); }
}
.track-artist {
  font-size: 16px; color: var(--text-dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 6px;
}
.time-row {
  display: flex; justify-content: space-between; margin-bottom: 8px;
}
.time-val { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
.prog-track {
  height: 3px; background: var(--border); border-radius: 2px;
  margin-bottom: 14px; cursor: pointer; position: relative;
}
.prog-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, rgba(0,229,255,0.35), var(--cyan));
  width: 0%; transition: width 0.5s linear; position: relative;
}
.prog-fill::after {
  content: ''; position: absolute; right: -5px; top: -4px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
}
.transport { display: flex; align-items: center; gap: 6px; }
.tb {
  background: none; border: none; cursor: pointer; color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  width: 40px; height: 40px; border-radius: 7px;
  transition: all 0.1s; padding: 0;
}
.tb:hover { color: var(--text); background: var(--raised); }
.tb.play-btn {
  width: 52px; height: 52px; border-radius: 50%;
  border: 1px solid var(--border-hi);
  background: var(--surface); color: var(--cyan);
  box-shadow: 0 0 18px var(--cyan-glow), inset 0 1px 0 rgba(255,255,255,0.04);
}
.tb.play-btn:hover { box-shadow: 0 0 28px rgba(0,229,255,0.3); }
.tb.play-btn.active {
  color: var(--amber); border-color: rgba(255,179,64,0.3);
  box-shadow: 0 0 22px var(--amber-glow);
}
.t-gap { flex: 1; }
.tb.sm { width: 34px; height: 34px; opacity: 0.4; }
.tb.sm:hover { opacity: 0.9; }
.tb.sm.lit { opacity: 0.8; color: var(--cyan); }

/* Widget panel */
.widget-col {
  border-left: 1px solid var(--border);
  position: relative; overflow: hidden;
}
/* ── VU widget ── */
.w-vu {
  padding: 16px 18px; height: 100%;
  display: flex; flex-direction: column; gap: 8px;
}
.w-header { display: flex; justify-content: space-between; align-items: baseline; }
.w-lbl { font-family: var(--mono); font-size: 8px; letter-spacing: 2px; color: var(--text-faint); text-transform: uppercase; }
.w-num { font-family: var(--mono); font-size: 32px; font-weight: 700; color: var(--amber); text-shadow: 0 0 14px var(--amber-glow); line-height: 1; }
.w-unit { font-size: 11px; color: var(--text-dim); }
.vu-bars { display: flex; gap: 6px; flex: 1; }
.vu-ch { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.vu-track {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 3px; overflow: hidden; display: flex; flex-direction: column-reverse;
}
.vu-bar {
  width: 100%; transition: height 0.07s ease-out;
  background: linear-gradient(to top, var(--green) 0%, #aaff44 62%, #ffee22 78%, var(--red) 94%);
}
.vu-lbl { font-family: var(--mono); font-size: 8px; color: var(--text-faint); text-align: center; }
.w-src-row { display: flex; justify-content: space-between; }
.w-src-lbl { font-family: var(--mono); font-size: 8px; color: var(--text-faint); letter-spacing: 1px; }
.w-src-val { font-family: var(--mono); font-size: 8px; color: var(--text-dim); }
/* ── Clock widget ── */
.w-clock {
  height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 16px 18px; gap: 4px;
}
.clk-time {
  font-family: var(--display); font-size: 62px; font-weight: 800;
  color: #dce8f8; letter-spacing: -2px; line-height: 1;
  text-shadow: 0 0 30px rgba(0,229,255,0.15);
}
.clk-secs { font-family: var(--mono); font-size: 18px; color: var(--cyan); opacity: 0.55; }
.clk-date { font-family: var(--mono); font-size: 9px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-top: 8px; }
/* ── Sysinfo widget ── */
.w-sysinfo {
  height: 100%; padding: 16px 18px;
  display: flex; flex-direction: column; justify-content: space-around;
}
.si-row { display: flex; flex-direction: column; gap: 5px; }
.si-head { display: flex; justify-content: space-between; align-items: baseline; }
.si-lbl { font-family: var(--mono); font-size: 8px; letter-spacing: 2px; color: var(--text-faint); text-transform: uppercase; }
.si-val { font-family: var(--mono); font-size: 18px; font-weight: bold; }
.si-val.ok   { color: var(--green); }
.si-val.warn { color: var(--amber); }
.si-val.hot  { color: var(--red);   }
.si-bar { height: 3px; background: var(--surface); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
.si-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease-out; }
.si-fill.cpu  { background: linear-gradient(90deg, #0050ff, #00e5ff); }
.si-fill.ram  { background: linear-gradient(90deg, #9c00ff, #d500f9); }
.si-fill.temp { background: linear-gradient(90deg, #00e676, #ffb340, #ff1744); }

/* ═══ QUICK LAUNCH BAR ═════════════════════════════════════════════════════ */
.launch-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  padding: 0 6px;
  gap: 5px;
  position: relative;
}
.launch-bar::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-hi) 30%, var(--border-hi) 70%, transparent);
}
.launch-btn {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  gap: 7px;
  border-radius: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  padding: 6px 10px;
  transition: all 0.1s;
  min-width: 0;
  margin: 7px 0;
  background: var(--raised);
  border-color: var(--border);
  position: relative;
  overflow: hidden;
  flex-direction: column;
}
.launch-btn::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
}
.launch-btn:hover { border-color: var(--border-hi); background: #222b3a; }
.launch-btn:active { transform: scale(0.93); }
.launch-btn.empty { background: transparent; border-color: var(--border); opacity: 0.15; cursor: default; }
.launch-btn.empty:hover { background: transparent; border-color: var(--border); }
.lb-icon { font-size: 22px; flex-shrink: 0; line-height: 1; }
.lb-label {
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.5px;
  color: var(--text-dim); white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; text-align: center; width: 100%;
}
.launch-btn.has-cmd .lb-label { color: var(--text); }

/* ═══ POT STRIP ═══════════════════════════════════════════════════════════ */
.pot-strip {
  background: var(--raised);
  display: flex; position: relative;
  min-height: 110px;
}
.pot-strip::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: var(--border-hi);
}
.pot-mod {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; padding: 8px 4px 6px;
  gap: 5px; position: relative;
  border-right: 1px solid var(--border);
  cursor: pointer; overflow: hidden; min-width: 0;
  transition: background 0.2s;
  background: var(--panel);
}
.pot-mod:last-child { border-right: none; }
.pot-mod:hover { filter: brightness(1.1); }

/* Coloured accent glow on assigned pots */
.pot-mod::after {
  content: ''; position: absolute; inset: 0;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
  border-radius: 0;
}
.pot-mod.assigned::after { opacity: 1; }

/* Channel number badge — top-left */
.pot-ch-badge {
  position: absolute; top: 4px; left: 5px;
  font-family: var(--mono); font-size: 7px; color: var(--text-faint);
  opacity: 0.5; letter-spacing: 0.5px;
}

/* AUTO pill — replaces MAN/AUTO badge */
.pot-mode-pill {
  position: absolute; top: 4px; right: 5px;
  font-family: var(--mono); font-size: 6px; letter-spacing: 1px;
  padding: 1px 4px; border-radius: 3px; text-transform: uppercase;
}
.pot-mode-pill.man {
  color: rgba(0,229,255,0.35); border: 1px solid rgba(0,229,255,0.12);
}
.pot-mode-pill.aut {
  color: rgba(255,179,64,0.7); border: 1px solid rgba(255,179,64,0.3);
  animation: badgePulse 2.5s ease-in-out infinite;
}
@keyframes badgePulse { 0%,100%{opacity:1} 50%{opacity:.35} }

.knob-svg { width: 44px; height: 44px; flex-shrink: 0; z-index: 1; margin-top: 10px; }

/* Volume % — big and prominent */
.pot-val {
  font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
  color: var(--amber); text-shadow: 0 0 8px var(--amber-glow);
  z-index: 1; line-height: 1;
}
.pot-val.dim { color: var(--text-faint); text-shadow: none; font-size: 10px; }

/* App name — below %, smaller, wraps with ellipsis */
.pot-name {
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.3px;
  color: var(--text-dim); text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  width: 100%; padding: 0 3px; z-index: 1;
  transition: color 0.2s;
}
.pot-name.empty    { color: var(--text-faint); font-size: 7px; }
.pot-name.autoname { color: rgba(255,179,64,0.7); }

/* Accent colour stripe at top of assigned pot */
.pot-accent-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  border-radius: 0;
}

/* ═══ POT MODAL ═══════════════════════════════════════════════════════════ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(2,5,10,0.88);
  backdrop-filter: blur(10px);
  z-index: 500; display: none;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--panel);
  border: 1px solid var(--border-hi); border-radius: 12px; width: 370px;
  box-shadow: 0 0 0 1px rgba(0,229,255,0.05), 0 28px 90px rgba(0,0,0,0.95),
    inset 0 1px 0 rgba(255,255,255,0.025);
  overflow: hidden;
}
.modal-head {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 18px; display: flex; align-items: center; gap: 10px;
}
.m-badge {
  width: 30px; height: 30px; border-radius: 7px;
  background: var(--cyan-glow); border: 1px solid rgba(0,229,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 9px; color: var(--cyan);
}
.m-title-col { flex: 1; }
.m-title { font-family: var(--display); font-size: 14px; font-weight: 700; color: #dce8f8; letter-spacing: 1px; }
.m-sub { font-family: var(--mono); font-size: 7px; color: var(--text-faint); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
.m-close {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--raised); border: 1px solid var(--border);
  cursor: pointer; color: var(--text-dim);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.m-close:hover { background: var(--border); color: var(--text); }
.modal-body { padding: 16px 18px; }
.mode-sw {
  display: flex; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
  overflow: hidden; margin-bottom: 16px;
}
.msw {
  flex: 1; padding: 10px 4px; background: none; border: none;
  cursor: pointer; font-family: var(--mono); font-size: 8px;
  letter-spacing: 2px; color: var(--text-faint); text-transform: uppercase;
  display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s;
}
.msw + .msw { border-left: 1px solid var(--border); }
.msw.on.manual { background: rgba(0,229,255,0.08); color: var(--cyan); }
.msw.on.auto   { background: rgba(255,179,64,0.08); color: var(--amber); }
.sect-lbl {
  font-family: var(--mono); font-size: 7px; letter-spacing: 2.5px;
  color: var(--text-faint); text-transform: uppercase; margin-bottom: 10px;
}
.app-sel { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 16px; }
.app-chip {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 4px 8px; cursor: pointer;
  text-align: center; display: flex; flex-direction: column;
  align-items: center; gap: 5px; transition: all 0.12s;
}
.app-chip:hover { border-color: var(--border-hi); background: var(--raised); }
.app-chip.sel { border-color: var(--cyan); background: rgba(0,229,255,0.07); box-shadow: 0 0 14px rgba(0,229,255,0.1); }
.ac-icon { font-size: 20px; line-height: 1; }
.ac-name { font-family: var(--mono); font-size: 7px; color: var(--text-dim); letter-spacing: 0.5px; }
.app-chip.sel .ac-name { color: var(--cyan); }
.auto-desc { background: rgba(255,179,64,0.04); border: 1px solid rgba(255,179,64,0.18); border-radius: 8px; padding: 12px 14px; display: none; margin-bottom: 16px; }
.auto-desc.show { display: block; }
.auto-desc p { font-family: var(--body); font-size: 12px; color: var(--text-dim); line-height: 1.6; }
.auto-desc strong { color: var(--amber); font-weight: 600; }
.m-actions { display: flex; gap: 8px; }
.mact {
  flex: 1; padding: 10px; border-radius: 7px; border: none; cursor: pointer;
  font-family: var(--mono); font-size: 8px; letter-spacing: 1.5px;
  text-transform: uppercase; transition: all 0.12s;
}
.mact.cancel  { background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); }
.mact.confirm { background: rgba(0,229,255,0.1); color: var(--cyan); border: 1px solid rgba(0,229,255,0.25); }

<script>
// ══════════════════════════════════════════════════
// CONFIG & STATE
// ══════════════════════════════════════════════════

const PI_API = 'http://localhost:5000';

// App palette: bg = subtle tinted panel, accent = glow/ring colour
// Groups: master=teal | music=green family | chat/browser=blue family | games=red/purple
const APPS = [
  { id:'Master',         name:'Master',    icon:'⬡',  bg:'#0d2028', accent:'#00e5ff' },
  { id:'spotify.exe',    name:'Spotify',   icon:'♪',  bg:'#0d2014', accent:'#1db954' },
  { id:'chrome.exe',     name:'Chrome',    icon:'◉',  bg:'#0d1828', accent:'#4285f4' },
  { id:'discord.exe',    name:'Discord',   icon:'◈',  bg:'#14122a', accent:'#5865f2' },
  { id:'firefox.exe',    name:'Firefox',   icon:'◎',  bg:'#2a1408', accent:'#ff6611' },
  { id:'vlc.exe',        name:'VLC',       icon:'▶',  bg:'#2a1a00', accent:'#ff8800' },
  { id:'msedge.exe',     name:'Edge',      icon:'◌',  bg:'#0a1830', accent:'#0078d4' },
  { id:'foobar2000.exe', name:'Foobar',    icon:'♫',  bg:'#0d2222', accent:'#0cd1e8' },
  { id:'steam.exe',      name:'Steam',     icon:'⊞',  bg:'#0f1a28', accent:'#1b2838' },
  { id:'epicgameslauncher.exe', name:'Epic', icon:'⬡', bg:'#1e0a28', accent:'#9d4dfa' },
];

const pots = Array.from({length:8}, (_,i) => ({
  ch:i, app:'', mode:'manual', value:-1
}));

let launchButtons  = [];
let activeWidget   = 'vu';
let playing        = false;
let clockTimer     = null;
let lastMediaTitle = '';

// ══════════════════════════════════════════════════
// FETCH WRAPPERS
// ══════════════════════════════════════════════════

async function apiFetch(path, opts={}) {
  try {
    const r = await fetch(PI_API + path, opts);
    return await r.json();
  } catch(e) { return null; }
}

async function apiPost(path, data) {
  return apiFetch(path, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
}

// ══════════════════════════════════════════════════
// STARTUP POLLING — load config from Pi Flask API
// ══════════════════════════════════════════════════

async function loadAllConfig() {
  // Pot config
  const potCfg = await apiFetch('/api/pot_config');
  if (potCfg) {
    pots.forEach(p => {
      const app = potCfg[String(p.ch)] || '';
      p.app  = app;
      p.mode = app === '__auto__' ? 'auto' : 'manual';
    });
  }
  // Right widget
  const wCfg = await apiFetch('/api/widget');
  if (wCfg) setWidget(wCfg.widget || 'vu');

  // Left widget
  const lwCfg = await apiFetch('/api/left_widget');
  if (lwCfg) setLeftWidget(lwCfg.widget || 'disc');

  // Display config (scroll settings)
  await loadDisplayConfig();

  // Launch buttons
  const lCfg = await apiFetch('/api/launch_config');
  if (lCfg) launchButtons = lCfg.buttons || [];

  renderPots();
  renderLaunchBar();
}

// ══════════════════════════════════════════════════
// LIVE POLL — pot values + sysinfo
// ══════════════════════════════════════════════════

async function pollStatus() {
  const data = await apiFetch('/api/status');
  if (!data) return;

  // ── Pot values (from hardware via /api/status) ──────────────────────────
  if (data.pot_values) {
    data.pot_values.forEach((v, i) => {
      if (v >= 0 && v !== pots[i].value) {
        pots[i].value = v;
        // Don't call updateKnob for the channel being dragged — drag handler owns it
        if (!_drag || _drag.ch !== i) updateKnob(i, v);
        if (pots[i].app === 'Master') updateVUMaster(v);
      }
    });
  }

  // ── Pot app assignments + resolved display names from PC ────────────────
  const potDisplay = data.pot_display || [];
  if (data.pot_apps) {
    let appsChanged = false;
    data.pot_apps.forEach((app, i) => {
      let newApp = app || '';
      let newMode = 'manual';
      if (newApp === '__auto__') {
        newMode = 'auto';
      } else if (newApp.startsWith('__auto__:')) {
        newApp = '__auto__';
        newMode = 'auto';
      }
      // Always update resolvedApp every poll so updateKnob has fresh colour data
      const resolvedDisplay = potDisplay[i] || (app && app.startsWith('__auto__:') ? app.slice(9) : '');
      if (pots[i].app !== newApp || pots[i].resolvedApp !== resolvedDisplay) {
        pots[i].app         = newApp;
        pots[i].mode        = newMode;
        pots[i].resolvedApp = resolvedDisplay;
        appsChanged = true;
      } else if (pots[i].mode === 'auto') {
        // Even if app/mode unchanged, keep resolvedApp fresh from pot_display
        pots[i].resolvedApp = resolvedDisplay;
      }
    });
    if (appsChanged && !_drag) renderPots();
  }

  // ── Media — delegate to applyMediaState, Python does all math ──────────────
  if (data.media) applyMediaState(data.media);
}

async function pollSysInfo() {
  if (activeWidget !== 'sysinfo') return;
  const d = await apiFetch('/api/pc_sysinfo');
  if (!d) return;
  const set = (id, val, unit='%') => {
    const el = document.getElementById(id);
    if (el) el.textContent = val + unit;
  };
  const cls = v => v > 85 ? 'si-val hot' : v > 60 ? 'si-val warn' : 'si-val ok';
  const bar = (id, pct) => { const el=document.getElementById(id); if(el) el.style.width=pct+'%'; };
  const cpu = document.getElementById('siCpu');
  const ram = document.getElementById('siRam');
  const tmp = document.getElementById('siTmp');
  if (cpu) { cpu.textContent = d.cpu+'%'; cpu.className = cls(d.cpu); }
  if (ram) { ram.textContent = d.ram+'%'; ram.className = cls(d.ram); }
  if (tmp) {
    const label = d.temp_label || 'TEMP';
    tmp.textContent = d.temp ? d.temp+'°C' : 'N/A';
    tmp.className = cls(d.temp || 0);
    // Update the label element if it exists
    const lblEl = document.getElementById('siTmpLbl');
    if (lblEl) lblEl.textContent = label;
  }
  bar('siCpuBar', d.cpu);
  bar('siRamBar', d.ram);
  bar('siTmpBar', Math.min(100, d.temp*100/80));
}

// ══════════════════════════════════════════════════
// MEDIA POLLING
// ══════════════════════════════════════════════════


// pollMedia retired — play state and title are now handled by pollStatus
// which reads from /api/status (updated by Pi background thread every 2s)

setInterval(pollStatus,  500);
setInterval(pollSysInfo, 3000);

// ══════════════════════════════════════════════════
// WIDGET SYSTEM
// ══════════════════════════════════════════════════

const WIDGETS = {
  vu: () => `
    <div class="w-vu">
      <div class="w-header">
        <span class="w-lbl">Output Level</span>
        <div><span class="w-num" id="wMasterPct">—</span><span class="w-unit"> %</span></div>
      </div>
      <div class="vu-bars">
        <div class="vu-ch">
          <div class="vu-track"><div class="vu-bar" id="vuL" style="height:0%"></div></div>
          <div class="vu-lbl">L</div>
        </div>
        <div class="vu-ch">
          <div class="vu-track"><div class="vu-bar" id="vuR" style="height:0%"></div></div>
          <div class="vu-lbl">R</div>
        </div>
      </div>
      <div class="w-src-row">
        <span class="w-src-lbl">SRC</span>
        <span class="w-src-val" id="wSrc">—</span>
      </div>
    </div>`,

  clock: () => `
    <div class="w-clock">
      <div class="clk-time" id="clkTime">00:00</div>
      <div class="clk-secs"><span id="clkSec">00</span>s</div>
      <div class="clk-date" id="clkDate">—</div>
    </div>`,

  sysinfo: () => `
    <div class="w-sysinfo">
      <div class="si-row">
        <div class="si-head"><span class="si-lbl">CPU</span><span class="si-val ok" id="siCpu">—</span></div>
        <div class="si-bar"><div class="si-fill cpu" id="siCpuBar" style="width:0%"></div></div>
      </div>
      <div class="si-row">
        <div class="si-head"><span class="si-lbl">RAM</span><span class="si-val ok" id="siRam">—</span></div>
        <div class="si-bar"><div class="si-fill ram" id="siRamBar" style="width:0%"></div></div>
      </div>
      <div class="si-row">
        <div class="si-head"><span class="si-lbl">TEMP</span><span class="si-val ok" id="siTmp">—</span></div>
        <div class="si-bar"><div class="si-fill temp" id="siTmpBar" style="width:0%"></div></div>
      </div>
    </div>`,
};

function setWidget(name) {
  activeWidget = name;
  clearInterval(clockTimer);
  const col = document.getElementById('widgetCol');
  col.innerHTML = WIDGETS[name] ? WIDGETS[name]() : '';
  if (name === 'clock') startClock();
  if (name === 'sysinfo') pollSysInfo();
  // Re-sync master pct if vu
  const master = pots.find(p => p.app === 'Master');
  if (master && master.value >= 0) updateVUMaster(master.value);
}

// Poll widget config changes from PC (every 10s)
setInterval(async () => {
  const d = await apiFetch('/api/widget');
  if (d && d.widget && d.widget !== activeWidget) setWidget(d.widget);
}, 10000);

// ══════════════════════════════════════════════════
// CLOCK
// ══════════════════════════════════════════════════

function startClock() {
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const tick = () => {
    const n = new Date();
    const pad = v => String(v).padStart(2,'0');
    const tEl = document.getElementById('clkTime');
    const sEl = document.getElementById('clkSec');
    const dEl = document.getElementById('clkDate');
    if (tEl) tEl.textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}`;
    if (sEl) sEl.textContent = pad(n.getSeconds());
    if (dEl) dEl.textContent = `${DAYS[n.getDay()]} · ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
  };
  tick();
  clockTimer = setInterval(tick, 1000);
}

// ══════════════════════════════════════════════════
// VU
// ══════════════════════════════════════════════════

function updateVUMaster(pct) {
  const el = document.getElementById('wMasterPct');
  if (el) el.textContent = pct;
}

function vuTick() {
  const vuL = document.getElementById('vuL');
  const vuR = document.getElementById('vuR');
  if (vuL && vuR && activeWidget === 'vu') {
    const base = pots.find(p=>p.app==='Master')?.value ?? 60;
    if (playing) {
      vuL.style.height = Math.max(0,Math.min(100, base+(Math.random()-.5)*50))+'%';
      vuR.style.height = Math.max(0,Math.min(100, base+(Math.random()-.5)*50))+'%';
    } else {
      vuL.style.height = '1%';
      vuR.style.height = '1%';
    }
  }
  setTimeout(vuTick, 75 + Math.random()*55);
}

// ══════════════════════════════════════════════════
// KNOB DRAWING
// ══════════════════════════════════════════════════

function drawKnob(svg, valuePct, active, accentColor) {
  const MIN=-135, MAX=135;
  const pct = valuePct<0 ? 0 : Math.max(0,Math.min(100,valuePct));
  const ang  = MIN+(pct/100)*(MAX-MIN);
  const r2   = a=>(a-90)*Math.PI/180;
  const cx=20, cy=20, bodyR=12, trackR=16;
  const pt  = (r,a)=>[cx+r*Math.cos(r2(a)), cy+r*Math.sin(r2(a))];
  const arc = (r,a1,a2)=>{
    const [x1,y1]=pt(r,a1),[x2,y2]=pt(r,a2);
    const lg=Math.abs(r2(a2)-r2(a1))>Math.PI?1:0;
    return `M${x1} ${y1}A${r} ${r} 0 ${lg} 1 ${x2} ${y2}`;
  };
  const [dx,dy]=pt(9,ang);
  const uid=svg.dataset.ch;
  const ac  = accentColor || 'var(--cyan)';
  const tc  = active ? ac : 'var(--border)';
  const dc  = active ? ac : 'var(--border-hi)';
  const gT  = active ? `filter:drop-shadow(0 0 3px ${ac})` : '';
  const gD  = active ? `filter:drop-shadow(0 0 3px ${ac})` : '';
  svg.innerHTML=`
  <defs>
    <radialGradient id="kb${uid}" cx="36%" cy="30%">
      <stop offset="0%" stop-color="${active?'#252a3a':'#1c2030'}"/>
      <stop offset="100%" stop-color="#0e1220"/>
    </radialGradient>
  </defs>
  <path d="${arc(trackR,MIN,MAX)}" fill="none" stroke="var(--border)" stroke-width="2" stroke-linecap="round"/>
  ${active&&pct>0?`<path d="${arc(trackR,MIN,ang)}" fill="none" stroke="${tc}" stroke-width="2" stroke-linecap="round" style="${gT}"/>`:''}
  <circle cx="${cx}" cy="${cy}" r="${bodyR}" fill="url(#kb${uid})" stroke="var(--border-hi)" stroke-width="1"/>
  <ellipse cx="${cx-3}" cy="${cy-3}" rx="4" ry="3" fill="rgba(255,255,255,0.025)"/>
  <circle cx="${cx}" cy="${cy}" r="${bodyR}" fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="0.5"/>
  <circle cx="${dx}" cy="${dy}" r="1.8" fill="${dc}" style="${gD}"/>`;
}

function updateKnob(ch, pct) {
  const svg = document.getElementById(`knob${ch}`);
  const pot = pots[ch];
  const isAuto   = pot.mode === 'auto';
  const resolved = isAuto ? (pot.resolvedApp || '') : '';
  const isActive = isAuto ? !!resolved : !!pot.app;
  // Colour: auto uses resolved app (with cyan fallback for unknown apps), manual uses assigned app
  let accent, bg;
  if (isAuto && resolved) {
    const info = appInfo(resolved);
    accent = info ? info.accent : '#00e5ff';
    bg     = info ? info.bg     : '#0d1a20';
  } else {
    const c = appColor(pot.app);
    accent = c.accent; bg = c.bg;
  }
  if (svg) drawKnob(svg, pct, isActive, accent);
  const mod = document.querySelector(`.pot-mod[data-ch="${ch}"]`);
  if (mod) {
    const v = mod.querySelector('.pot-val');
    if (v) {
      v.textContent = pct >= 0 ? pct+'%' : '---';
      v.classList.toggle('dim', pct < 0);
      if (isActive && pct >= 0) v.style.color = accent;
    }
    if (isActive) {
      mod.style.background = bg;
      mod.classList.add('assigned');
      const bar = mod.querySelector('.pot-accent-bar');
      if (bar) bar.style.background = accent;
      const nameEl = mod.querySelector('.pot-name');
      if (nameEl) {
        nameEl.style.color = accent + '99';
        nameEl.classList.remove('autoname', 'empty');
        if (isAuto && resolved) {
          const info = appInfo(resolved);
          nameEl.textContent = info ? info.name : resolved.replace(/\.exe$/i, '');
        }
      }
    } else {
      mod.classList.remove('assigned');
    }
  }
}

// ── Knob drag interaction ────────────────────────────────────────────────────
// Vertical drag: drag up = louder, drag down = quieter
// Also supports mouse wheel on the whole pot cell
let _drag = null; // { ch, startY, startVal }

function _knobStartDrag(e, ch) {
  const pot = pots[ch];
  // Knob drag is display-only — Python SPI thread controls actual volume.
  // Tapping an unassigned pot opens the assignment modal.
  if (!pot.app && pot.mode !== 'auto') { openModal(ch); return; }
  e.preventDefault();
  e.stopPropagation();
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const startVal = pot.value >= 0 ? pot.value : 50;
  // Snap the knob to startVal visually immediately if it was unset
  if (pot.value < 0) { pots[ch].value = 50; updateKnob(ch, 50); }
  _drag = { ch, startY: clientY, startVal };
  document.addEventListener('mousemove',  _knobDrag,    {passive:false});
  document.addEventListener('touchmove',  _knobDrag,    {passive:false});
  document.addEventListener('mouseup',    _knobEndDrag);
  document.addEventListener('touchend',   _knobEndDrag);
}

function _knobDrag(e) {
  // Display-only drag — Python SPI thread handles actual volume.
  // Dragging the knob is visual feedback only; real value comes from /api/status poll.
  if (!_drag) return;
  e.preventDefault();
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const delta = (_drag.startY - clientY) / 1.2;
  const newVal = Math.round(Math.max(0, Math.min(100, _drag.startVal + delta)));
  pots[_drag.ch].value = newVal;
  updateKnob(_drag.ch, newVal);
  if (pots[_drag.ch].app === 'Master') updateVUMaster(newVal);
}

function _knobEndDrag(e) {
  if (!_drag) return;
  _drag = null;
  document.removeEventListener('mousemove',  _knobDrag);
  document.removeEventListener('touchmove',  _knobDrag);
  document.removeEventListener('mouseup',    _knobEndDrag);
  document.removeEventListener('touchend',   _knobEndDrag);
  renderPots(); // restore correct colours/labels after drag
}

// Volume POSTs removed — Python SPI thread handles all volume control




function _knobWheel(e, ch) {
  // Wheel is display-only — Python handles actual volume via SPI
  const pot = pots[ch];
  if (!pot.app && pot.mode !== 'auto') return;
  e.preventDefault();
  const delta = e.deltaY < 0 ? 3 : -3;
  const newVal = Math.round(Math.max(0, Math.min(100, (pot.value >= 0 ? pot.value : 50) + delta)));
  pots[ch].value = newVal;
  updateKnob(ch, newVal);
  if (pot.app === 'Master') updateVUMaster(newVal);
}

function renderLaunchBar() {
  const bar = document.getElementById('launchBar');
  // Always show 10 slots
  const slots = 10;
  bar.innerHTML = '';
  for (let i = 0; i < slots; i++) {
    const cfg = launchButtons[i] || null;

    btn.className = 'launch-btn' + (cfg && cfg.label ? ' has-cmd' : ' empty');
    btn.dataset.i = i;
    if (cfg && cfg.color && cfg.label) {
      btn.style.borderColor = cfg.color + '55';
      btn.style.boxShadow   = `inset 0 0 0 1px ${cfg.color}22`;
    }
    btn.innerHTML = cfg && cfg.label
      ? `<span class="lb-icon">${cfg.icon||'▶'}</span><span class="lb-label">${cfg.label}</span>`
      : `<span class="lb-label" style="opacity:.2">—</span>`;
    if (cfg && cfg.label) {
      btn.addEventListener('click', () => {
        btn.style.transform = 'scale(0.92)';
        setTimeout(()=>btn.style.transform='', 120);
        apiPost('/api/launch_pressed', {index: i});
      });
    }
    bar.appendChild(btn);
  }
}

// ══════════════════════════════════════════════════
// POT STRIP
// ══════════════════════════════════════════════════

function appInfo(id) { 
  if (!id) return null;
  const low = id.toLowerCase();
  return APPS.find(a => a.id.toLowerCase() === low) || null;
}

function appColor(app) {
  if (!app) return {bg:'var(--panel)', accent:'#2a3a4a'};
  const low = app.toLowerCase();
  const a = APPS.find(a => a.id.toLowerCase() === low);
  return a ? {bg:a.bg||'var(--panel)', accent:a.accent||'#00e5ff'}
           : {bg:'var(--panel)', accent:'#2a3a4a'};
}

function renderPots() {
  const strip = document.getElementById('potStrip');
  strip.innerHTML = '';
  pots.forEach((pot,i)=>{
    const isAuto = pot.mode==='auto';
    const resolvedName = pot.resolvedApp || '';
    // For auto pots with a resolved app, look up its style; otherwise use auto defaults
    const resolvedAppInfo = resolvedName ? appInfo(resolvedName) : null;
    const app    = isAuto ? resolvedAppInfo : appInfo(pot.app);
    const isAssigned = !isAuto && !!app;
    const isAutoActive = isAuto && !!resolvedName;  // auto + any resolved name = light it up
    const hasVal = pot.value >= 0;
    // Label: auto+resolved shows app name, pure auto shows 'AUTO', manual shows app name
    const label  = isAuto
      ? (resolvedAppInfo ? resolvedAppInfo.name : (resolvedName ? resolvedName.replace('.exe','').replace('.EXE','') : 'AUTO'))
      : (app ? app.name : `CH ${i}`);
    // Colours: auto-active uses resolved app colour; unknown apps get generic cyan
    const {bg, accent} = isAutoActive
      ? (resolvedAppInfo ? appColor(resolvedName) : {bg:'#0d1a20', accent:'#00e5ff'})
      : appColor(pot.app);

    const m = document.createElement('div');
    m.className = ['pot-mod', (isAssigned||isAutoActive)?'assigned':'', isAuto?'is-auto':''].join(' ').trim();
    m.dataset.ch = i;

    // Dynamic background colour based on assigned app
    if (isAssigned || isAutoActive) {
      m.style.background = bg;
    }

    m.innerHTML = `
      <div class="pot-accent-bar" style="background:${isAssigned||isAutoActive ? accent : 'transparent'}"></div>
      <span class="pot-ch-badge">${i}</span>
      <span class="pot-mode-pill ${isAuto?'aut':'man'}">${isAuto?'AUTO':'MAN'}</span>
      <svg class="knob-svg" data-ch="${i}" id="knob${i}" viewBox="0 0 40 40"></svg>
      <div class="pot-val ${hasVal?'':'dim'}" style="${isAssigned||isAutoActive ? `color:${accent};text-shadow:0 0 10px ${accent}55` : ''}">${hasVal ? pot.value+'%' : '---'}</div>
      <div class="pot-name ${isAuto&&!isAutoActive?'autoname':!app&&!isAuto?'empty':''}" style="${isAssigned||isAutoActive ? `color:${accent}99` : ''}">${label}</div>`;

    // Tap on knob SVG = drag to control; tap elsewhere on cell = open modal
    const knobEl = m.querySelector('.knob-svg');
    if (knobEl) {
      knobEl.addEventListener('mousedown',  e => _knobStartDrag(e, i), {passive:false});
      knobEl.addEventListener('touchstart', e => _knobStartDrag(e, i), {passive:false});
      knobEl.addEventListener('wheel',      e => _knobWheel(e, i),     {passive:false});
    }
    // Click on rest of card = open assignment modal
    m.addEventListener('click', e => {
      if (knobEl && knobEl.contains(e.target)) return; // handled by drag
      openModal(i);
    });
    strip.appendChild(m);
    drawKnob(document.getElementById(`knob${i}`), pot.value, isAssigned||isAutoActive, accent);
  });
}

// ══════════════════════════════════════════════════
// POT MODAL
// ══════════════════════════════════════════════════

let mPot=-1, mMode='manual', mApp='';

function openModal(ch) {
  mPot=ch; mMode=pots[ch].mode;
  mApp=pots[ch].app==='__auto__'?'':pots[ch].app;
  document.getElementById('mBadge').textContent=`P${ch}`;
  document.getElementById('mSub').textContent=`Channel ${ch} · ${mMode==='auto'?'Auto-detect':'Manual'}`;
  applyMode(); renderChips();
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function setMode(m) {
  mMode=m;
  document.getElementById('mSub').textContent=`Channel ${mPot} · ${m==='auto'?'Auto-detect':'Manual'}`;
  applyMode();
}
function applyMode() {
  const isA=mMode==='auto';
  document.getElementById('mswMan').className ='msw manual'+(isA?'':' on');
  document.getElementById('mswAuto').className='msw auto'  +(isA?' on':'');
  document.getElementById('manualSec').style.display=isA?'none':'block';
  document.getElementById('autoDesc').className='auto-desc'+(isA?' show':'');
}
function renderChips() {
  document.getElementById('appSel').innerHTML=APPS.map(a=>`
    <div class="app-chip ${mApp===a.id?'sel':''}" onclick="pickApp('${a.id}')">
      <div class="ac-icon">${a.icon}</div>
      <div class="ac-name">${a.name.toUpperCase()}</div>
    </div>`).join('');
}
function pickApp(id) { mApp=id; renderChips(); }
async function confirmPot() {
  if(mPot<0) return;
  pots[mPot].mode = mMode;
  pots[mPot].app  = mMode === 'auto' ? '__auto__' : mApp;
  const cfg = {};
  pots.forEach(p => cfg[String(p.ch)] = p.app);
  const res = await apiPost('/api/pot_config', cfg);
  // res can be null on network error, or {status:'success'} on ok
  if (res === null) {
    console.error('confirmPot: no response from Pi');
  }
  closeModal();
  renderPots();
}

async function clearPot() {
  if(mPot<0) return;
  pots[mPot].app  = '';
  pots[mPot].mode = 'manual';
  const cfg = {};
  pots.forEach(p => cfg[String(p.ch)] = p.app);
  await apiPost('/api/pot_config', cfg);
  closeModal();
  renderPots();
}
document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===e.currentTarget) closeModal();
});

// ══════════════════════════════════════════════════
// LEFT WIDGET SYSTEM  — 4 animated widgets, swipe to switch
// ══════════════════════════════════════════════════

const LEFT_WIDGET_ORDER = ['disc', 'circvu', 'waveform', 'spectrum'];
let activeLeftWidget = 'disc';
let _lwAnimFrame     = null;   // requestAnimationFrame handle for canvas widgets
let _lwPlaying       = false;  // current play state for animations
let _dotsHideTimer   = null;

// ── Templates ───────────────────────────────────────────────────────────────

const LEFT_WIDGETS = {
  disc: () => `
    <div class="lw-disc">
      <div class="art-disc" id="disc"><div class="disc-hub"></div></div>
    </div>`,

  circvu: () => `
    <div class="lw-circular-vu">
      <canvas id="circVuCanvas" width="220" height="256"></canvas>
    </div>`,

  waveform: () => `
    <div class="lw-waveform">
      <canvas id="waveCanvas" width="220" height="256"></canvas>
      <span class="lw-waveform-lbl">WAVEFORM</span>
    </div>`,

  spectrum: () => `
    <div class="lw-spectrum">
      <canvas id="specCanvas" width="220" height="256"></canvas>
      <span class="lw-spectrum-lbl">SPECTRUM</span>
    </div>`,
};

// ── Dots ────────────────────────────────────────────────────────────────────

function _renderDots() {
  const container = document.getElementById('lwDots');
  if (!container) return;
  container.innerHTML = LEFT_WIDGET_ORDER.map((w, i) =>
    `<span class="lw-dot${w === activeLeftWidget ? ' active' : ''}"></span>`
  ).join('');
}

function _showDots() {
  const el = document.getElementById('lwDots');
  if (!el) return;
  _renderDots();
  el.classList.add('visible');
  clearTimeout(_dotsHideTimer);
  _dotsHideTimer = setTimeout(() => el.classList.remove('visible'), 2000);
}

// ── Widget lifecycle ─────────────────────────────────────────────────────────

function setLeftWidget(name, fromSwipe = false) {
  if (!LEFT_WIDGETS[name]) return;
  // Cancel any running canvas animation
  if (_lwAnimFrame) { cancelAnimationFrame(_lwAnimFrame); _lwAnimFrame = null; }

  activeLeftWidget = name;
  const col = document.getElementById('leftWidgetCol');
  col.innerHTML = LEFT_WIDGETS[name]();

  // Re-apply current media state
  if (_lastMediaState) _lwApplyState(_lastMediaState);

  // Start canvas animation for applicable widgets
  if (name === 'circvu')   _startCircVu();
  if (name === 'waveform') _startWaveform();
  if (name === 'spectrum') _startSpectrum();

  if (fromSwipe) _showDots();
}

// ── Swipe handling ───────────────────────────────────────────────────────────

let _swipeStartX = null;
let _swipeStartY = null;

document.getElementById('artCol').addEventListener('touchstart', e => {
  _swipeStartX = e.touches[0].clientX;
  _swipeStartY = e.touches[0].clientY;
}, {passive: true});

document.getElementById('artCol').addEventListener('touchend', e => {
  if (_swipeStartX === null) return;
  const dx = e.changedTouches[0].clientX - _swipeStartX;
  const dy = e.changedTouches[0].clientY - _swipeStartY;
  _swipeStartX = _swipeStartY = null;
  if (Math.abs(dx) < 30 || Math.abs(dy) > Math.abs(dx)) return; // not a horizontal swipe
  const idx     = LEFT_WIDGET_ORDER.indexOf(activeLeftWidget);
  const next    = (idx + (dx < 0 ? 1 : -1) + LEFT_WIDGET_ORDER.length) % LEFT_WIDGET_ORDER.length;
  setLeftWidget(LEFT_WIDGET_ORDER[next], true);
  // Persist to Pi
  apiPost('/api/left_widget', {widget: LEFT_WIDGET_ORDER[next]});
}, {passive: true});

// Mouse swipe support (for desktop/dev)
document.getElementById('artCol').addEventListener('mousedown', e => {
  _swipeStartX = e.clientX; _swipeStartY = e.clientY;
});
document.getElementById('artCol').addEventListener('mouseup', e => {
  if (_swipeStartX === null) return;
  const dx = e.clientX - _swipeStartX;
  const dy = e.clientY - _swipeStartY;
  _swipeStartX = _swipeStartY = null;
  if (Math.abs(dx) < 30 || Math.abs(dy) > Math.abs(dx)) return;
  const idx  = LEFT_WIDGET_ORDER.indexOf(activeLeftWidget);
  const next = (idx + (dx < 0 ? 1 : -1) + LEFT_WIDGET_ORDER.length) % LEFT_WIDGET_ORDER.length;
  setLeftWidget(LEFT_WIDGET_ORDER[next], true);
  apiPost('/api/left_widget', {widget: LEFT_WIDGET_ORDER[next]});
});

// ── State application ────────────────────────────────────────────────────────

let _lastMediaState = null;

function updateLeftWidget(m) {
  _lastMediaState = m;
  _lwPlaying      = !!m.playing;
  _lwApplyState(m);
}

function _lwApplyState(m) {
  if (activeLeftWidget === 'disc') {
    const disc = document.getElementById('disc');
    if (disc) {
      disc.classList.toggle('spinning', !!m.playing);
      if (m.title) {
        const col = SRC_HUE[m.source] || '#1a3050';
        disc.style.background = `radial-gradient(circle at 35% 30%, ${col}60 0%, ${col}18 50%, #0a1220 100%)`;
        disc.style.boxShadow  = `0 0 24px ${col}30, inset 0 0 12px rgba(0,0,0,0.8)`;
      }
    }
  }
  // Canvas widgets react via their own animation loops reading _lwPlaying
}

// Poll left widget config (every 10s — only updates if PC/Pi changed it remotely)
setInterval(async () => {
  const d = await apiFetch('/api/left_widget');
  if (d && d.widget && d.widget !== activeLeftWidget) setLeftWidget(d.widget);
}, 10000);

// ═══════════════════════════════════════════════════════════════════
// ANIMATION 2: Circular VU  — radial bars pulsing around a disc
// ═══════════════════════════════════════════════════════════════════

function _startCircVu() {
  const canvas = document.getElementById('circVuCanvas');
  if (!canvas) return;
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const NUM_BARS   = 48;
  const INNER_R    = 52;
  const MAX_BAR    = 44;
  const BAR_W_DEG  = 5.5;
  const bars       = Array.from({length: NUM_BARS}, () => ({ h: 2, vel: 0 }));
  const peaks      = Array.from({length: NUM_BARS}, () => 0);
  let   rotation   = 0;

  function frame() {
    _lwAnimFrame = requestAnimationFrame(frame);
    if (document.getElementById('circVuCanvas') !== canvas) return;
    ctx.clearRect(0, 0, W, H);

    // Subtle rotating gradient bg disc
    rotation += _lwPlaying ? 0.004 : 0;
    const grd = ctx.createRadialGradient(cx, cy, 10, cx, cy, INNER_R);
    grd.addColorStop(0, '#0a1220');
    grd.addColorStop(1, '#0d1a30');
    ctx.beginPath();
    ctx.arc(cx, cy, INNER_R, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Grooves on inner disc
    for (let r = 20; r < INNER_R - 4; r += 7) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(0,229,255,0.04)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Disc hub
    ctx.beginPath();
    ctx.arc(cx, cy, 10, 0, Math.PI * 2);
    ctx.fillStyle = '#080a0d';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,229,255,0.25)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Update and draw bars
    for (let i = 0; i < NUM_BARS; i++) {
      const b = bars[i];
      if (_lwPlaying) {
        // Randomised target with some smoothing — groups of bars move together for realism
        const groupSeed = Math.sin(Date.now() * 0.002 + i * 0.42) * 0.5 + 0.5;
        const micro     = Math.random() * 0.4;
        const target    = Math.pow(groupSeed * 0.7 + micro * 0.3, 1.5) * MAX_BAR;
        b.vel = (target - b.h) * 0.22;
        b.h   = Math.max(2, b.h + b.vel);
      } else {
        b.h = Math.max(2, b.h * 0.88); // decay to rest
      }
      peaks[i] = Math.max(peaks[i] * 0.97, b.h);

      const angle     = (i / NUM_BARS) * Math.PI * 2 - Math.PI / 2 + rotation;
      const halfW     = (BAR_W_DEG * Math.PI / 180) / 2;
      const r1        = INNER_R + 3;
      const r2        = r1 + b.h;

      // Bar fill — gradient from cyan (low) to amber (high)
      const t         = b.h / MAX_BAR;
      const r         = Math.round(0 + t * 255);
      const g         = Math.round(229 - t * 50);
      const bl        = Math.round(255 - t * 240);
      ctx.beginPath();
      ctx.moveTo(cx + r1 * Math.cos(angle - halfW), cy + r1 * Math.sin(angle - halfW));
      ctx.lineTo(cx + r2 * Math.cos(angle - halfW), cy + r2 * Math.sin(angle - halfW));
      ctx.lineTo(cx + r2 * Math.cos(angle + halfW), cy + r2 * Math.sin(angle + halfW));
      ctx.lineTo(cx + r1 * Math.cos(angle + halfW), cy + r1 * Math.sin(angle + halfW));
      ctx.closePath();
      ctx.fillStyle = `rgba(${r},${g},${bl},0.85)`;
      ctx.fill();

      // Peak dot
      const pr = r1 + peaks[i] + 2;
      ctx.beginPath();
      ctx.arc(cx + pr * Math.cos(angle), cy + pr * Math.sin(angle), 1.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${bl},0.6)`;
      ctx.fill();
    }

    // Outer ring
    ctx.beginPath();
    ctx.arc(cx, cy, INNER_R + MAX_BAR + 8, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,229,255,0.05)';
    ctx.lineWidth   = 1;
    ctx.stroke();
  }
  frame();
}

// ═══════════════════════════════════════════════════════════════════
// ANIMATION 3: Waveform oscilloscope
// ═══════════════════════════════════════════════════════════════════

function _startWaveform() {
  const canvas = document.getElementById('waveCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  let phase = 0;
  let amp   = 4;  // current amplitude

  function frame() {
    _lwAnimFrame = requestAnimationFrame(frame);
    if (document.getElementById('waveCanvas') !== canvas) return;

    // Fade trail
    ctx.fillStyle = 'rgba(5,8,16,0.25)';
    ctx.fillRect(0, 0, W, H);

    const targetAmp = _lwPlaying ? 38 + Math.random() * 24 : 3;
    amp += (targetAmp - amp) * 0.08;

    const cy      = H / 2;
    const speed   = _lwPlaying ? 0.07 : 0.012;
    phase        += speed;

    // Grid lines
    ctx.strokeStyle = 'rgba(0,230,118,0.04)';
    ctx.lineWidth = 1;
    for (let y = 0; y < H; y += 32) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    for (let x = 0; x < W; x += 32) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }

    // Centre line
    ctx.strokeStyle = 'rgba(0,230,118,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();

    // Glow pass (wide, faint)
    ctx.beginPath();
    ctx.lineWidth = 6;
    ctx.shadowBlur = 0;
    for (let x = 0; x <= W; x += 2) {
      const t = x / W;
      const y = cy
        + Math.sin(t * Math.PI * 5 + phase) * amp
        + Math.sin(t * Math.PI * 9 + phase * 1.3) * amp * 0.35
        + Math.sin(t * Math.PI * 2 + phase * 0.6) * amp * 0.5;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(0,230,118,0.12)';
    ctx.stroke();

    // Sharp line
    ctx.beginPath();
    ctx.lineWidth = 1.5;
    for (let x = 0; x <= W; x += 1) {
      const t = x / W;
      const y = cy
        + Math.sin(t * Math.PI * 5 + phase) * amp
        + Math.sin(t * Math.PI * 9 + phase * 1.3) * amp * 0.35
        + Math.sin(t * Math.PI * 2 + phase * 0.6) * amp * 0.5;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    // Gradient stroke
    const grad = ctx.createLinearGradient(0, 0, W, 0);
    grad.addColorStop(0,   'rgba(0,230,118,0.3)');
    grad.addColorStop(0.3, 'rgba(0,230,118,0.9)');
    grad.addColorStop(0.7, 'rgba(0,230,118,0.9)');
    grad.addColorStop(1,   'rgba(0,230,118,0.3)');
    ctx.strokeStyle = grad;
    ctx.shadowColor = '#00e676';
    ctx.shadowBlur  = _lwPlaying ? 8 : 2;
    ctx.stroke();
    ctx.shadowBlur  = 0;

    // Scan line (moving right → left)
    const scan = ((Date.now() * 0.04) % W);
    ctx.strokeStyle = 'rgba(0,230,118,0.18)';
    ctx.lineWidth   = 1;
    ctx.beginPath(); ctx.moveTo(W - scan, 0); ctx.lineTo(W - scan, H); ctx.stroke();
  }
  frame();
}

// ═══════════════════════════════════════════════════════════════════
// ANIMATION 4: Spectrum analyzer
// ═══════════════════════════════════════════════════════════════════

function _startSpectrum() {
  const canvas = document.getElementById('specCanvas');
  if (!canvas) return;
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const NUM  = 28;
  const PAD  = 6;
  const GAP  = 2;
  const bw   = (W - PAD * 2 - GAP * (NUM - 1)) / NUM;
  const bars = Array.from({length: NUM}, (_, i) => ({
    h:   2,
    // Shape: more energy in low-mids, roll off at extremes
    base: Math.pow(Math.sin((i / (NUM - 1)) * Math.PI), 0.6) * 0.8 + 0.2,
  }));
  const peaks = Array.from({length: NUM}, () => 0);

  function frame() {
    _lwAnimFrame = requestAnimationFrame(frame);
    if (document.getElementById('specCanvas') !== canvas) return;
    ctx.clearRect(0, 0, W, H);

    // Floor grid
    ctx.strokeStyle = 'rgba(152,80,255,0.07)';
    ctx.lineWidth = 1;
    for (let y = H; y > 0; y -= 30) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    const maxH = H - 20;
    const now  = Date.now();

    for (let i = 0; i < NUM; i++) {
      const b = bars[i];
      if (_lwPlaying) {
        // Natural-feeling pseudo-random spectral motion
        const slow = Math.sin(now * 0.0008 + i * 0.6) * 0.5 + 0.5;
        const fast = Math.sin(now * 0.003  + i * 1.1) * 0.5 + 0.5;
        const kick = Math.sin(now * 0.0015) > 0.7 ? 1 : 0;
        const t    = slow * 0.5 + fast * 0.3 + kick * 0.2;
        const target = b.base * maxH * (t * 0.75 + 0.05) + (Math.random() * 8);
        b.h += (target - b.h) * 0.18;
      } else {
        b.h = Math.max(2, b.h * 0.91);
      }
      peaks[i] = _lwPlaying
        ? Math.max(peaks[i] * 0.982, b.h)
        : Math.max(2, peaks[i] * 0.96);

      const x = PAD + i * (bw + GAP);
      const y = H - b.h;
      const t = b.h / maxH;

      // Bar gradient: deep purple → magenta → amber at top
      const gr = ctx.createLinearGradient(x, y, x, H);
      gr.addColorStop(0,   `rgba(255,${Math.round(64 + t*92)},${Math.round(255 - t*230)},0.9)`);
      gr.addColorStop(0.5, `rgba(180,60,255,0.8)`);
      gr.addColorStop(1,   `rgba(90,20,160,0.5)`);
      ctx.fillStyle = gr;
      ctx.fillRect(x, y, bw, b.h);

      // Thin bright top edge
      ctx.fillStyle = `rgba(255,180,255,${0.4 + t * 0.5})`;
      ctx.fillRect(x, y, bw, 2);

      // Peak line
      const py = H - peaks[i] - 3;
      ctx.fillStyle = `rgba(255,${Math.round(120 + t*135)},255,0.7)`;
      ctx.fillRect(x, py, bw, 1.5);
    }

    // Bottom reflection (mirror, faded)
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.scale(1, -0.25);
    ctx.translate(0, -H * 4 - (H - 20) * 0);
    for (let i = 0; i < NUM; i++) {
      const b = bars[i];
      const x = PAD + i * (bw + GAP);
      ctx.fillStyle = 'rgba(180,60,255,0.9)';
      ctx.fillRect(x, H - b.h, bw, b.h);
    }
    ctx.restore();
  }
  frame();
}

// ══════════════════════════════════════════════════
// TITLE SCROLL
// ══════════════════════════════════════════════════

let scrollConfig = { enabled: true, interval: 8 }; // interval in seconds between scroll cycles
let _scrollTimer  = null;
let _scrollActive = false;

async function loadDisplayConfig() {
  const d = await apiFetch('/api/display_config');
  if (d) {
    scrollConfig.enabled  = d.scroll_enabled !== false;
    scrollConfig.interval = parseInt(d.scroll_interval) || 8;
  }
}

function triggerTitleScroll() {
  if (!scrollConfig.enabled) return;
  const wrap  = document.getElementById('tTitleWrap');
  const title = document.getElementById('tTitle');
  if (!wrap || !title) return;

  const overflowPx = title.scrollWidth - wrap.offsetWidth;
  if (overflowPx <= 4) return; // no overflow, nothing to scroll

  // Calculate duration: ~80px/s feels natural
  const scrollDur   = Math.max(3, overflowPx / 80);
  const totalCycle  = scrollDur + 1.5; // scroll + brief pause at end

  title.style.setProperty('--scroll-dist', `-${overflowPx + 12}px`);
  title.style.setProperty('--scroll-dur',  `${scrollDur}s`);
  title.style.setProperty('--scroll-delay', '0.3s');

  // Remove then re-add class to restart animation
  title.classList.remove('scrolling');
  void title.offsetWidth; // force reflow
  title.classList.add('scrolling');

  // After animation completes, reset to start and schedule next scroll
  _scrollActive = true;
  setTimeout(() => {
    title.classList.remove('scrolling');
    title.style.transform = '';
    _scrollActive = false;
    scheduleNextScroll();
  }, (totalCycle) * 1000);
}

function scheduleNextScroll() {
  clearTimeout(_scrollTimer);
  if (!scrollConfig.enabled) return;
  _scrollTimer = setTimeout(triggerTitleScroll, scrollConfig.interval * 1000);
}

function resetTitleScroll() {
  clearTimeout(_scrollTimer);
  const title = document.getElementById('tTitle');
  if (title) {
    title.classList.remove('scrolling');
    title.style.transform = '';
  }
  _scrollActive = false;
  scheduleNextScroll();
}


const SRC_HUE = {
  SPOTIFY:'#1db954', CHROME:'#4285f4', FIREFOX:'#ff6611',
  EDGE:'#0078d4', VLC:'#ff8800', FOOBAR:'#0cd1e8',
  AMAZON:'#ff9900', GROOVE:'#8866ff',
};

function applyMediaState(m) {
  // Play / pause — skip state update during debounce window after button press
  const nowPlaying = !!m.playing;
  if (Date.now() > _playDebounceUntil && nowPlaying !== playing) {
    setPlayingVisual(nowPlaying);
  }
  // Progress bar + times — Python pre-computed these
  document.getElementById('progFill').style.width  = (m.position_pct || 0) + '%';
  document.getElementById('tElapsed').textContent  = m.elapsed_str  || '0:00';
  document.getElementById('tDuration').textContent = m.duration_str || '0:00';
  // Title / artist — update on change, then trigger scroll
  if (m.title && m.title !== lastMediaTitle) {
    lastMediaTitle = m.title;
    document.getElementById('tTitle').textContent  = m.title;
    document.getElementById('tArtist').textContent = m.artist || '—';
    const srcTag = document.getElementById('srcTag');
    const srcDot = document.getElementById('srcDot');
    const wSrc   = document.getElementById('wSrc');
    if (srcTag) { srcTag.textContent = m.source || ''; srcTag.classList.toggle('live', !!m.source); }
    if (srcDot)   srcDot.classList.toggle('live', !!m.source);
    if (wSrc)     wSrc.textContent = m.source || '—';
    setTimeout(resetTitleScroll, 100);
  }
  // Always update left widget animations
  updateLeftWidget(m);
}

document.getElementById('btnNext').onclick = () => apiPost('/api/button_pressed', {button_index:'media_next'});
